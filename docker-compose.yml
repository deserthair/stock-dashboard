services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: restin
      POSTGRES_USER: restin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-restin_dev_pwd}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restin -d restin"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    command: >
      sh -c "python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://restin:${DB_PASSWORD:-restin_dev_pwd}@db:5432/restin
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./backend
    restart: unless-stopped
    command: python -m ingest.scheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://restin:${DB_PASSWORD:-restin_dev_pwd}@db:5432/restin
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pg_data:
